name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Test
        run: cargo test --no-fail-fast

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Ensure cross is installed
        run: |
          cargo install cross
      - name: Build
        run: cross build --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v7
        with:
          name: publish-linux
          path: |
            target/x86_64-unknown-linux-gnu/release/memocp

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: publish-windows
          path: |
            target/release/memocp.exe

  build-docker:
    name: Build (Docker)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: memocp
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
