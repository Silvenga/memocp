name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  actions: read
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Ensure cross is installed
        run: |
          cargo install cross
      - name: Test
        run: cargo test --no-fail-fast

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Ensure cross is installed
        run: |
          cargo install cross
      - name: Build
        run: cross build --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v4
        with:
          name: publish-linux
          path: |
            target/x86_64-unknown-linux-gnu/release/memocp

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cross build --release
      - uses: actions/upload-artifact@v4
        with:
          name: publish-windows
          path: |
            target/release/memocp.exe
